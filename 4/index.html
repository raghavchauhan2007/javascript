<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUESS THE NUMBER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <header>
            <h2>NUMBER GUESSING GAME</h2>
        </header>
        <div class="desc">
            <p>Try and guess a number between 1 and 100.</p>
            <p>You have 10 attempts to guess the right number.</p>
        </div>
        <div class="title"><h1>Guess a Number</h1></div>
        <form>
            <input type="text" id="input" placeholder="Guess">
            <button type="submit" id="submit">Submit Guess</button>
        </form>
        <footer>
            <p class="array">Previous Guesses: </p>
            <p >Attempts Left: <span class="attempts-left">10</span></p>
            <p class="error"></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
